<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Scout</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <nav class = "Nav-Bar">
        <div class = "Home-Button">
            <a href="#">
                <h3>
                    Sound Scout
                </h3>
            </a>
        </div>
    </nav>

    <main>
        <div class = "Title">
            <div class = "Title-Text">
                <h1>
                    Sound Scout Artist Recommendation
                </h1>
            </div>
            <div class = "Title-Image">
                <img src="notes.png">
            </div>
        </div>
        <div class="Input-Boxes">
            <div class="Input-Boxes-Title">
                <img src="chart.png" alt="">
                <h3>Some of My Favorite Artists Are...</h3>
            </div>

            <div class="Input-Box" style="position: relative;">
                <input type="text" class="artist-input" placeholder="Artist 1" autocomplete="off">
                <ul class="suggestions-list"></ul> </div>

            <div class="Input-Box" style="position: relative;">
                <input type="text" class="artist-input" placeholder="Artist 2" autocomplete="off">
                <ul class="suggestions-list"></ul> </div>

            <div class="Input-Box" style="position: relative;">
                <input type="text" class="artist-input" placeholder="Artist 3" autocomplete="off">
                <ul class="suggestions-list"></ul> </div>

            <div class="Recommendation-Button">
                <div>
                    <a href="#">Recommend Me!</a>
                </div>
            </div>
            <div id="recommendations-container" class="Results-Section">
            </div>
        </div>
    </main>




</body>
</html>
